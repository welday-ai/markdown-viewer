<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Markdown Viewer</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #17212b;
      --muted: #5a6b7b;
      --accent: #0b63f6;
      --border: #dde5ef;
      --code: #eef3fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #f7f9fc 0%, #edf3fb 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
    }
    .sidebar { padding: 16px; }
    .content { padding: 24px; min-height: 70vh; }
    h1 {
      margin: 0 0 12px;
      font-size: 1.1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .files {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .files a {
      display: block;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      border: 1px solid transparent;
      background: #f8fbff;
    }
    .files a:hover,
    .files a.active {
      background: #edf4ff;
      border-color: #c8dbff;
      color: #093b8d;
    }
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 { margin-top: 1.2em; }
    .markdown-body pre {
      background: var(--code);
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
    }
    .markdown-body code {
      background: var(--code);
      padding: 0.15em 0.3em;
      border-radius: 4px;
    }
    .status { color: var(--muted); margin-bottom: 12px; }
    @media (max-width: 860px) {
      .wrap { grid-template-columns: 1fr; }
      .content { min-height: auto; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <main class="wrap">
    <aside class="panel sidebar">
      <h1>Documents</h1>
      <ul id="fileList" class="files"></ul>
    </aside>
    <section class="panel content">
      <div id="status" class="status">Loading document list...</div>
      <article id="viewer" class="markdown-body"></article>
    </section>
  </main>

  <script>
    async function loadDocs() {
      const status = document.getElementById('status');
      const fileList = document.getElementById('fileList');
      const viewer = document.getElementById('viewer');

      const files = [
        'README.md',
        'engineering-standards.md'
      ];

      function setActive(name) {
        [...fileList.querySelectorAll('a')].forEach((a) => {
          a.classList.toggle('active', a.dataset.file === name);
        });
      }

      async function render(name) {
        setActive(name);
        status.textContent = `Viewing: ${name}`;
        try {
          const res = await fetch(`docs/${name}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const md = await res.text();
          viewer.innerHTML = marked.parse(md);
          history.replaceState(null, '', `#${encodeURIComponent(name)}`);
        } catch (err) {
          viewer.innerHTML = `<p>Unable to load ${name}: ${err.message}</p>`;
        }
      }

      files.forEach((name) => {
        const li = document.createElement('li');
        const link = document.createElement('a');
        link.href = `#${encodeURIComponent(name)}`;
        link.dataset.file = name;
        link.textContent = name;
        link.addEventListener('click', (e) => {
          e.preventDefault();
          render(name);
        });
        li.appendChild(link);
        fileList.appendChild(li);
      });

      const fromHash = decodeURIComponent((location.hash || '').replace(/^#/, ''));
      const initial = files.includes(fromHash) ? fromHash : files[0];
      await render(initial);
    }

    loadDocs();
  </script>
</body>
</html>

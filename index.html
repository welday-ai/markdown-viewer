<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown + JSON Viewer</title>
    <style>
      :root {
        --bg: #f6f8fc;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5a6c86;
        --border: #d9e1ee;
        --accent: #0b63e5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #eaf1ff, var(--bg) 35%);
        color: var(--text);
      }
      .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 40px; }
      h1 { margin: 0; font-size: clamp(1.5rem, 2.8vw, 2.1rem); }
      .sub { margin: 8px 0 0; color: var(--muted); }
      .toolbar {
        margin-top: 18px;
        display: grid;
        gap: 10px;
        grid-template-columns: 170px 1fr auto;
      }
      select, input[type="text"], input[type="file"], button {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
        background: #fff;
      }
      button { cursor: pointer; color: #fff; background: var(--accent); border-color: var(--accent); }
      .viewer {
        margin-top: 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        min-height: 260px;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .muted { color: var(--muted); }
      code { background: #eef3ff; padding: 1px 5px; border-radius: 6px; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      @media (max-width: 760px) {
        .toolbar { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Markdown + JSON Viewer</h1>
      <p class="sub">View <code>.md</code> and <code>.json</code> files from sample paths, URL params, or local uploads.</p>

      <div class="toolbar">
        <select id="preset" aria-label="Preset file">
          <option value="sample.md">sample.md</option>
          <option value="sample.json">sample.json</option>
        </select>
        <input id="path" type="text" placeholder="Relative file path (e.g. sample.md)" />
        <button id="loadBtn" type="button">Load</button>
      </div>

      <div class="toolbar">
        <input id="upload" type="file" accept=".md,.markdown,.json" />
        <div class="muted">Quick links: <a href="?file=sample.md">?file=sample.md</a> · <a href="?file=sample.json">?file=sample.json</a></div>
        <div></div>
      </div>

      <article id="viewer" class="viewer">Loading...</article>
    </main>

    <script>
      const viewer = document.getElementById("viewer");
      const preset = document.getElementById("preset");
      const pathInput = document.getElementById("path");
      const loadBtn = document.getElementById("loadBtn");
      const upload = document.getElementById("upload");

      function extensionOf(name) {
        return (name.split(".").pop() || "").toLowerCase();
      }

      function renderByType(content, ext) {
        if (ext === "json") {
          const parsed = JSON.parse(content);
          viewer.textContent = JSON.stringify(parsed, null, 2);
          return;
        }
        viewer.textContent = content;
      }

      async function loadPath(filePath) {
        if (!filePath) return;
        const res = await fetch(filePath);
        if (!res.ok) throw new Error(`Failed to load ${filePath} (${res.status})`);
        const text = await res.text();
        renderByType(text, extensionOf(filePath));
        const url = new URL(window.location.href);
        url.searchParams.set("file", filePath);
        window.history.replaceState({}, "", url);
      }

      loadBtn.addEventListener("click", async () => {
        const filePath = pathInput.value.trim() || preset.value;
        try {
          await loadPath(filePath);
        } catch (err) {
          viewer.textContent = err.message;
        }
      });

      preset.addEventListener("change", () => {
        pathInput.value = preset.value;
      });

      upload.addEventListener("change", async () => {
        const file = upload.files[0];
        if (!file) return;
        const text = await file.text();
        try {
          renderByType(text, extensionOf(file.name));
        } catch (err) {
          viewer.textContent = err.message;
        }
      });

      const initial = new URLSearchParams(window.location.search).get("file") || "sample.md";
      pathInput.value = initial;
      preset.value = ["sample.md", "sample.json"].includes(initial) ? initial : "sample.md";
      loadBtn.click();
    </script>
  </body>
</html>

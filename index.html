<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown + JSON Viewer</title>
    <style>
      :root {
        --bg: #f6f8fc;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5a6c86;
        --border: #d9e1ee;
        --accent: #0b63e5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #eaf1ff, var(--bg) 35%);
        color: var(--text);
      }
      .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 40px; }
      h1 { margin: 0; font-size: clamp(1.5rem, 2.8vw, 2.1rem); }
      .sub { margin: 8px 0 0; color: var(--muted); }
      .toolbar {
        margin-top: 18px;
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr auto;
      }
      select, button {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
        background: #fff;
      }
      button { cursor: pointer; color: #fff; background: var(--accent); border-color: var(--accent); }
      .viewer {
        margin-top: 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        min-height: 260px;
        line-height: 1.5;
      }
      .viewer pre {
        background: #eef3ff;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow-x: auto;
        padding: 12px;
      }
      .viewer code {
        background: #eef3ff;
        border-radius: 6px;
        padding: 1px 5px;
      }
      .muted { color: var(--muted); margin-top: 10px; }
      code { background: #eef3ff; padding: 1px 5px; border-radius: 6px; }
      @media (max-width: 760px) {
        .toolbar { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Markdown + JSON Viewer</h1>
      <p class="sub">Preloaded file menu includes all repo <code>.md</code> files and portfolio JSON.</p>

      <div class="toolbar">
        <select id="preset" aria-label="Preloaded file"></select>
        <button id="loadBtn" type="button">Load</button>
      </div>

      <p class="muted" id="hint"></p>
      <article id="viewer" class="viewer">Loading...</article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const FILES = [
        "README.md",
        "docs/README.md",
        "docs/business-portfolio-summary.md",
        "docs/welday-about-page-strategy.md",
        "docs/engineering-standards.md",
        "data/portfolio_catalog.json"
      ];

      const viewer = document.getElementById("viewer");
      const preset = document.getElementById("preset");
      const loadBtn = document.getElementById("loadBtn");
      const hint = document.getElementById("hint");

      preset.innerHTML = FILES.map((file) => `<option value="${file}">${file}</option>`).join("");

      function extensionOf(name) {
        return (name.split(".").pop() || "").toLowerCase();
      }

      function renderByType(content, ext) {
        if (ext === "json") {
          const parsed = JSON.parse(content);
          viewer.innerHTML = "";
          const pre = document.createElement("pre");
          const code = document.createElement("code");
          code.textContent = JSON.stringify(parsed, null, 2);
          pre.appendChild(code);
          viewer.appendChild(pre);
          return;
        }
        if (ext === "md" || ext === "markdown") {
          viewer.innerHTML = marked.parse(content);
          return;
        }
        viewer.textContent = content;
      }

      async function loadPath(filePath) {
        const res = await fetch(filePath);
        if (!res.ok) throw new Error(`Failed to load ${filePath} (${res.status})`);
        const text = await res.text();
        renderByType(text, extensionOf(filePath));
        hint.textContent = `Loaded: ${filePath}`;
        const url = new URL(window.location.href);
        url.searchParams.set("file", filePath);
        window.history.replaceState({}, "", url);
      }

      loadBtn.addEventListener("click", async () => {
        try {
          await loadPath(preset.value);
        } catch (err) {
          viewer.textContent = err.message;
        }
      });

      preset.addEventListener("change", () => loadBtn.click());

      const initial = new URLSearchParams(window.location.search).get("file");
      if (initial && FILES.includes(initial)) {
        preset.value = initial;
      }
      loadBtn.click();
    </script>
  </body>
</html>
